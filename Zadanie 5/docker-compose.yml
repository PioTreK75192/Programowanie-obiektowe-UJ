services:
  server:
    build:
      context: ./server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - CLIENT_ORIGIN=http://localhost:8000

  client:
    build:
      context: ./client
      args:
        - VITE_API_URL=http://localhost:5000
    ports:
      - "8000:80"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - server
