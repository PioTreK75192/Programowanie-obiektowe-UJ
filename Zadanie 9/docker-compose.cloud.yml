services:
  server:
    build:
      context: ./server
    restart: unless-stopped
    expose:
      - "5000"
    environment:
      - PORT=5000
      - CLIENT_ORIGIN=${CLIENT_ORIGIN}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  client:
    build:
      context: ./client
      args:
        - VITE_API_URL=
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_healthy
