services:
  server:
    build:
      context: ./server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - CLIENT_ORIGIN=http://localhost:8000
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  client:
    build:
      context: ./client
    restart: unless-stopped
    ports:
      - "8000:80"
    depends_on:
      server:
        condition: service_healthy
